# schemas/proposta.yaml
#id: string,
#id_prestacao_servico: string,
#id_prestador: string,
#preco_hora: number,
#horas_estimadas: number,
#estado: string,
#enabled: boolean,
#created_at: string,
#updated_at: string,

components:
  schemas:
    # schema principal de proposta
    Proposta:
      type: object
      properties:
        id:
          type: string
          example: "uuid-1234-5678"
        id_prestacao_servico:
          type: string
          example: "f9dad001-a0da-4081-ac59-e82886b290a1"
        id_prestador:
          type: integer
          example: 1
        preco_hora:
          type: string
          example: "200"
        horas_estimadas:
          type: string
          example: "8"
        estado:
          type: string
          example: "Finalizado"
        enabled_at:
          type: boolean
          example: true
        created_at:
          type: string
          example: "2025-12-10T00:00:00.000Z"
        updated_at:
          type: string
          example: "2025-12-10T00:00:00.000Z"

    # schema para criar uma nova proposta
    CreateProposta:
      type: object
      properties:
        id:
          type: integer
          example: 1
        id_prestacao_servico:
          type: string
          example: "f9dad001-a0da-4081-ac59-e82886b290a1"
        preco_hora:
          type: string
          example: "200"
        horas_estimadas:
          type: string
          example: "8"
        estado:
          type: string
          example: "Finalizado"
        enabled_at:
          type: boolean
          example: true

    PropostaAceite:
      type: object
      description: Representa uma proposta que foi aceite
      properties:
        id:
          type: integer
          description: ID da proposta
          example: 10
        id_prestacao_servico:
          type: integer
          description: ID da prestação de serviço associada
          example: 5
        estado:
          type: string
          description: Estado atual da proposta
          enum:
            - Pendente
            - Aceite
            - Rejeitada
          example: Aceite
        data_aceite:
          type: string
          format: date-time
          description: Data em que a proposta foi aceite
          example: "2026-04-04T15:30:00Z"
        mensagem:
          type: string
          description: Mensagem de confirmação
          example: "Proposta aceite com sucesso"      

    # schemas generico para sucesso
    PropostaResponseSucess:
      type: object
      properties:
        message:
          type: string
          example: "Proposta criado com sucess"
        status:
          type: boolean
          example: true
        data:
          type: object
          $ref: "#/components/schemas/Proposta"

    # schemas generico de resposta de erro
    PropostaResponseError:
      type: object
      properties:
        message:
          type: string
          exemple: "Erro ao buscar proposta"
        status:
          type: boolean
          example: false
        data:
          type: object
          properties:
            null

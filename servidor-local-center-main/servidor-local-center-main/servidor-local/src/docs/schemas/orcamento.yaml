# schemas/orcamento.yaml
#id: string,
#total: number,
#id_utilizadores: string,
#enabled: boolean,
#created_at: string,
#updated_at: string 

components:
  schemas:
    # schema principal de orcamento
    Orcamento:
      type: object
      required:
        - id
        - total
        - id_utilizadores
        - enabled
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          example: 1
        total:
          type: number
          example: 500
        id_utilizadores:
          type: string
          example: "a2e25ed1-e1e7-45d6-92cb-d2d8fb342ec0"
        enabled:
          type: boolean
          example: true
        created_at:
          type: string
          example: "2000-12-10T00:00:00.000Z"
        updated_at:
          type: string
          example: "2000-12-10T00:00:00.000Z"

    # schemas para criar um novo orcamento
    CreateOrcamento:
      type: object
      required:
        - total
        - id_utilizadores
      properties:
        total:
          type: string
          example: "500"
        id_utilizadores:
          type: string
          example: "a2e25ed1-e1e7-45d6-92cb-d2d8fb342ec0"
        enabled:
          type: boolean
          default: true
          example: true

    CalcularOrcamentoResponse:
      type: object
      description: Resultado do cálculo do orcamento
      required:
        - id
        - id_prestador
        - taxa_urgencia
        - subtotal
        - total
        - servicos
      properties:
        id:
          type: integer
          example: 1
        id_prestador:
          type: integer
          example: 1
        taxa_urgencia:
          type: number
          format: float
          example: 10
        subtotal:
          type: number
          format: float
          example: 200
        total:
          type: number
          format: float
          example: 220
        servicos:
          type: array
          description: Lista de serviços do orçamento com total individual
          items:
            $ref: '#/components/schemas/CalcularResponse'

    # schemas generico para sucesso
    OrcamentoResponseSucess:
      type: object
      properties:
        message:
          type: string
          example: "Orcamento criado com sucess"
        status:
          type: boolean
          example: true
        data:
          type: object
          $ref: "#/components/schemas/Orcamento"

    # schemas generico de resposta de erro
    OrcamentoResponseError:
      type: object
      properties:
        message:
          type: string
          example: "Erro ao buscar orcamento"
        status:
          type: boolean
          example: false
        data:
          type: object
          properties:
            null


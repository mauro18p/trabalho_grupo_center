# schemas/servico.yaml
#id: string;
#nome: string;
#descricao: string;
#categoria: string;
#enabled_at: boolean;
#created_at: string;
#updated_at: string;

components:
  schemas:
    # schema principal de servico
    Servico:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: "Servico de limpeza"
        descricao:
          type: string
          example: " Servico de Limpeza Profissional para residentes e empresa"
        categoria:
          type: string
          example: "Limpeza"
        enabled_at:
          type: boolean
          example: true
        created_at:
          type: string
          example: "2010-12-10T00:00:00.000Z"
        updated_at:
          type: string
          example: "2010-12-10T00:00:00.000Z"

    # schemas para criar um novo servico
    CreateService:
      type: object
      properties:
        nome:
          type: string
          example: "Servico de Limpeza"
        descricao:
          type: string
          example: "Servico de Limpeza Profissional para residentes e empresa"
        categoria:
          type: string
          example: Limpeza
        enabled_at:
          type: boolean
          example: true

    # schemas  buscar servico detalhado    
    ServicoDetalhado:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: "Servico de limpeza"
        descricao:
          type: string
          example: " Servico de Limpeza Profissional para residentes e empresa"
        designacao_categoria:
          type: string
          example: "Designação do serviço"
        icone_categoria:
          type: string
          example: "Icone do serviço"
        id_empresa:
          type: integer
          example: 1
        designacao_empresa:
          type: string
          example: "Empresa de Limpeza"
        enabled:
          type: boolean
          example: true

    # schemas generico para sucesso
    ServiceResponseSucess:
      type: object
      properties:
        message:
          type: string
          example: "Servico criado com sucess"
        status:
          type: boolean
          example: true
        data:
          type: object
          $ref: "#/components/schemas/Servico"

    # schemas generico de resposta de erro
    ServiceResponseError:
      type: object
      properties:
        message:
          type: string
          example: "Erro ao buscar servicos"
        status:
          type: boolean
          example: false
        data:
          type: object
          properties:
            null

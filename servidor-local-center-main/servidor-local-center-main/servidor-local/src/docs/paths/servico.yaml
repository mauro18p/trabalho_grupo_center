# paths/servico.yaml

paths:
  /service:
    get:
      summary: Listar todos os servicos
      tags:
        - service
      description: Retorna uma lista de todos os servicos disponiveis
      responses:
        "200":
          description: Lista de servicos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Servico"
        "404":
          description: Nenhum servico encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"

  /service/create:
    post:
      summary: Criar um novo servico
      tags:
        - service
      description: Criar um novo servico
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateService"
      responses:
        "200":
          description: Servico criado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseSucess"
        "400":
          description: Dados invalidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"

  /service/get-by-id/{id}:
    get:
      summary: Buscar um servico por ID
      tags:
        - service
      description: Retorna um servico especifico pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do servico
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Servico encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseSucess"
        "404":
          description: Servico nao encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"

  /service/update/{id}:
    put:
      summary: Atualizar um servico
      tags:
        - service
      description: Atualizar um servico especifico pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do servico
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateService"
      responses:
        "200":
          description: Servico atualizado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseSucess"
        "400":
          description: Dados invalidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"
        "404":
          description: Servico nao encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"

  /service/delete/{id}:
    delete:
      summary: Apagar um servico
      tags:
        - service
      description: Apagar um servico especifico pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do servico
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Servico apagado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseSucess"
        "404":
          description: Servico nao encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"

  \service/all-detailed:
    get:
      summary: Listar todos os servicos detalhados
      tags:
        - service
      description: Retorna uma lista de todos os servicos disponiveis com detalhes
      parameters:
        - name: limit
          in: query
          required: false
          description: Limite de servicos a serem retomados
          schema:
            type: integer
            example: 10
        - name: offset
          in: query
          required: false
          description: offset de servicos a serem retomados
          schema:
            type: integer
            example: 0
      responses:
        "200":
          description: Lista de servicos detalhados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServicoDetalhado"
        "404":
          description: Nenhum servico encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseError"            

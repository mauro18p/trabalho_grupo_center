#paths/prest_serv.yaml

paths:
  /serviceProv:
    get:
      summary: Listar todos as prestações de serviços
      tags:
        - service provision
      description: Retorna uma lista de todas as prestações de serviços disponiveis
      responses:
        "200":
          description: Lista de prestações de serviços
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PrestacaoServico"
        "404":
          description: Prestacao Servico não encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseErroPrestacaoServico"
  /serviceProv/create:
    post:
      summary: criar novo Prestacao Servico
      tags:
        - service provision
      description: cria um novo Prestacao Servico
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              $ref: "#/components/schemas/CreatePrestacaoServico"
      responses:
        "200":
          description: Prestacao Servico criado com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseSucessoPrestacao"
        "400":
          description: Dados inválidos fornecidos
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseErroPrestacao"
  /serviceProv/get-by-id/{id}:
    get:
      summary: Buscar um Prestacao Servico
      tags:
        - service provision
      description: Retorna um Prestacao Servico especifico pelo ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID do Prestacao Servico a ser buscado
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Prestacao Servico encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseSucessoPrestacao"
        "404":
          description: Prestacao Servico não encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseErroPrestacao"
  /serviceProv/update/{id}:
    put:
      summary: atualizar um Prestacao Servico
      tags:
        - service provision
      description: Atualizar Prestacao Servico pelo id
      parameters:
        - name: id
          in: path
          required: true
          description: ID do Prestacao Servico a ser atualizado
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              $ref: "#/components/schemas/CreatePrestacaoServico"
      responses:
        "200":
          description: Prestacao Servico atualizado com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseSucessoPrestacao"
        "400":
          description: Dados inválidos fornecidos
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseErroPrestacao"
        "404":
          description: Prestacao Servico não encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseErroPrestacao"
  /serviceProv/delete/{id}:
    delete:
      summary: Deletar um Prestacao Servico
      tags:
        - service provision
      description: Deletar Prestacao Servico pelo id
      parameters:
        - name: id
          in: path
          required: true
          description: ID do Prestacao Servico a ser deletado
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Prestacao Servico deletado com sucesso
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseSucessoPrestacao"
        "404":
          description: Prestacao Servico não encontrado
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseErroPrestacao"
  /serviceProv/get-all-details:
    get:
      summary: Listar todos as prestações de serviços com detalhes
      tags:
        - service provision
      description: Retorna uma lista de todas as prestações de serviços disponiveis com detalhes
      parameters:
        - name: limit
          in: query
          required: false 
          description: Limite de prestações de serviços a serem retornadas
          schema:
            type: string
            example: "10"
        - name: offset
          in: query
          required: false
          description: Offset de prestações de serviços a serem retornadas
          schema:
            type: string
            example: "0"
      responses:
        "200":
          description: Lista de prestações de serviços com detalhes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResponseSucessoPrestacao"
        "500":
          description: Erro ao buscar prestações de serviços
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseErroPrestacao"
  /serviceProv/get-all-by-categoria/{id_categoria}:
    get:
      summary: Listar todos as prestações de serviços por categoria
      tags:
        - service provision
      description: Retorna uma lista de todas as prestações de serviços disponiveis por categoria
      parameters:
        - name: id_categoria
          in: path
          required: true
          description: ID da categoria
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Lista de prestações de serviços por categoria
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResponseSucessoPrestacao"
        "500":
          description: Erro ao buscar prestações de serviços por categoria
          content:
            application/json:
              schema:
                type: object
                $ref: "#/components/schemas/ResponseErroPrestacao"